<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Welcome</title>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Sans:wght@300;400&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    background: #0a0a0a;
    color: #f0ede6;
    font-family: 'DM Sans', sans-serif;
    height: 100vh;
    width: 100vw;
    overflow: hidden;
    display: flex;
    align-items: center;
    justify-content: center;
    cursor: none;
  }

  .cursor {
    position: fixed;
    width: 10px;
    height: 10px;
    background: #e8d5a3;
    border-radius: 50%;
    pointer-events: none;
    z-index: 9999;
    transform: translate(-50%, -50%);
    transition: transform 0.1s ease;
  }

  .cursor-trail {
    position: fixed;
    width: 30px;
    height: 30px;
    border: 1px solid rgba(232,213,163,0.3);
    border-radius: 50%;
    pointer-events: none;
    z-index: 9998;
    transform: translate(-50%, -50%);
    transition: left 0.12s ease, top 0.12s ease;
  }

  canvas {
    position: fixed;
    top: 0; left: 0;
    width: 100%; height: 100%;
    z-index: 0;
    opacity: 0.18;
  }

  .scene {
    position: relative;
    z-index: 1;
    text-align: center;
    user-select: none;
  }

  .line-top {
    display: flex;
    align-items: center;
    gap: 16px;
    justify-content: center;
    margin-bottom: 8px;
    opacity: 0;
    animation: fadeUp 1s ease 0.2s forwards;
  }

  .line-top span {
    font-size: 11px;
    letter-spacing: 0.3em;
    text-transform: uppercase;
    color: #e8d5a3;
    font-weight: 300;
  }

  .line-top::before, .line-top::after {
    content: '';
    display: block;
    width: 60px;
    height: 1px;
    background: linear-gradient(90deg, transparent, #e8d5a3);
  }
  .line-top::after {
    background: linear-gradient(90deg, #e8d5a3, transparent);
  }

  h1 {
    font-family: 'Bebas Neue', sans-serif;
    font-size: clamp(96px, 18vw, 220px);
    line-height: 0.88;
    letter-spacing: 0.02em;
    color: #f0ede6;
    opacity: 0;
    animation: fadeUp 1s ease 0.5s forwards;
    position: relative;
  }

  h1 .stroke {
    -webkit-text-stroke: 1px #f0ede6;
    color: transparent;
  }

  .subtitle {
    font-size: 13px;
    font-weight: 300;
    letter-spacing: 0.2em;
    color: rgba(240,237,230,0.45);
    margin-top: 20px;
    opacity: 0;
    animation: fadeUp 1s ease 0.8s forwards;
  }

  .enter-btn {
    margin-top: 48px;
    display: inline-block;
    opacity: 0;
    animation: fadeUp 1s ease 1.1s forwards;
  }

  .enter-btn button {
    background: transparent;
    border: 1px solid rgba(232,213,163,0.5);
    color: #e8d5a3;
    font-family: 'DM Sans', sans-serif;
    font-size: 11px;
    letter-spacing: 0.25em;
    text-transform: uppercase;
    padding: 14px 40px;
    cursor: none;
    transition: background 0.3s, border-color 0.3s, color 0.3s;
    position: relative;
    overflow: hidden;
  }

  .enter-btn button::before {
    content: '';
    position: absolute;
    inset: 0;
    background: #e8d5a3;
    transform: scaleX(0);
    transform-origin: left;
    transition: transform 0.35s ease;
  }

  .enter-btn button:hover::before { transform: scaleX(1); }
  .enter-btn button:hover { color: #0a0a0a; border-color: #e8d5a3; }
  .enter-btn button span { position: relative; z-index: 1; }

  .corner {
    position: fixed;
    font-size: 10px;
    letter-spacing: 0.2em;
    color: rgba(240,237,230,0.2);
    text-transform: uppercase;
    font-weight: 300;
  }
  .corner.tl { top: 28px; left: 32px; }
  .corner.tr { top: 28px; right: 32px; }
  .corner.bl { bottom: 28px; left: 32px; }
  .corner.br { bottom: 28px; right: 32px; }

  .ticker {
    position: fixed;
    bottom: 0;
    left: 0;
    right: 0;
    height: 36px;
    border-top: 1px solid rgba(240,237,230,0.07);
    display: flex;
    align-items: center;
    overflow: hidden;
    z-index: 2;
  }

  .ticker-inner {
    display: flex;
    gap: 80px;
    white-space: nowrap;
    animation: ticker 22s linear infinite;
    font-size: 10px;
    letter-spacing: 0.2em;
    color: rgba(240,237,230,0.18);
    text-transform: uppercase;
  }

  @keyframes ticker {
    from { transform: translateX(0); }
    to { transform: translateX(-50%); }
  }

  @keyframes fadeUp {
    from { opacity: 0; transform: translateY(24px); }
    to { opacity: 1; transform: translateY(0); }
  }
</style>
</head>
<body>

<div class="cursor" id="cur"></div>
<div class="cursor-trail" id="trail"></div>

<canvas id="c"></canvas>

<div class="scene">
  <div class="line-top"><span>Est. 2025</span></div>
  <h1>WEL<br><span class="stroke">COME</span></h1>
  <p class="subtitle">Glad you're here &nbsp;·&nbsp; Make yourself at home</p>
  <div class="enter-btn">
    <button onclick="this.innerText='→'"><span>Enter</span></button>
  </div>
</div>

<div class="corner tl">00°N 00°E</div>
<div class="corner tr" id="clock"></div>
<div class="corner bl">V 1.0</div>
<div class="corner br">2025</div>

<div class="ticker">
  <div class="ticker-inner" id="tick"></div>
</div>

<script>
  const cur = document.getElementById('cur');
  const trail = document.getElementById('trail');
  document.addEventListener('mousemove', e => {
    cur.style.left = e.clientX + 'px';
    cur.style.top = e.clientY + 'px';
    trail.style.left = e.clientX + 'px';
    trail.style.top = e.clientY + 'px';
  });

  const words = ['Welcome · ', 'Hello · ', 'Bienvenue · ', 'Bienvenido · ', 'Benvenuto · ', 'Willkommen · ', 'Добро пожаловать · ', 'Привіт · '];
  const t = document.getElementById('tick');
  t.innerHTML = (words.join('')).repeat(6);

  function updateClock() {
    const now = new Date();
    document.getElementById('clock').textContent =
      now.getHours().toString().padStart(2,'0') + ':' +
      now.getMinutes().toString().padStart(2,'0') + ':' +
      now.getSeconds().toString().padStart(2,'0');
  }
  updateClock();
  setInterval(updateClock, 1000);

  const canvas = document.getElementById('c');
  const ctx = canvas.getContext('2d');
  canvas.width = window.innerWidth;
  canvas.height = window.innerHeight;
  window.addEventListener('resize', () => {
    canvas.width = window.innerWidth;
    canvas.height = window.innerHeight;
  });

  const dots = Array.from({length: 80}, () => ({
    x: Math.random() * canvas.width,
    y: Math.random() * canvas.height,
    r: Math.random() * 1.5 + 0.3,
    vx: (Math.random() - 0.5) * 0.3,
    vy: (Math.random() - 0.5) * 0.3,
  }));

  function draw() {
    ctx.clearRect(0, 0, canvas.width, canvas.height);
    dots.forEach(d => {
      d.x += d.vx; d.y += d.vy;
      if (d.x < 0 || d.x > canvas.width) d.vx *= -1;
      if (d.y < 0 || d.y > canvas.height) d.vy *= -1;
      ctx.beginPath();
      ctx.arc(d.x, d.y, d.r, 0, Math.PI * 2);
      ctx.fillStyle = '#e8d5a3';
      ctx.fill();
    });
    dots.forEach((a, i) => {
      dots.slice(i+1).forEach(b => {
        const dx = a.x - b.x, dy = a.y - b.y;
        const dist = Math.sqrt(dx*dx + dy*dy);
        if (dist < 120) {
          ctx.beginPath();
          ctx.moveTo(a.x, a.y);
          ctx.lineTo(b.x, b.y);
          ctx.strokeStyle = `rgba(232,213,163,${(1 - dist/120) * 0.4})`;
          ctx.lineWidth = 0.5;
          ctx.stroke();
        }
      });
    });
    requestAnimationFrame(draw);
  }
  draw();
</script>
</body>
</html>
